<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=S, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tic Tac Toe | Game</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="game">
      <div class="game-result">
        <h1 class="result-text"></h1>
        <div class="game-players">
          <p class="player-x">Player X: <span class="score-x">0</span></p>
          <button class="new-game-btn">New game</button>
          <p class="player-0">Player 0: <span class="score-0">0</span></p>
        </div>
      </div>
      <div class="board">
        <svg class="win-line" width="360" height="370">
          <line
            x1="0"
            y1="0"
            x2="0"
            y2="0"
            stroke="#f83434"
            stroke-width="4px"
          />
        </svg>

        <div class="row" data-row="0">
          <button data-column="0"></button><button data-column="1"></button
          ><button data-column="2"></button>
        </div>
        <div class="row" data-row="1">
          <button data-column="0"></button><button data-column="1"></button
          ><button data-column="2"></button>
        </div>
        <div class="row" data-row="2">
          <button data-column="0"></button><button data-column="1"></button
          ><button data-column="2"></button>
        </div>
      </div>
    </div>
  </body>
</html>
